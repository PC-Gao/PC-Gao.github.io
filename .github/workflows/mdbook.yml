name: Deploy mdBook

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        run: cargo install mdbook --version 0.5.2

      - name: Build
        run: mdbook build

      - name: Copy static assets
        shell: pwsh
        run: ./scripts/copy-book-assets.ps1

      - name: Patch sidebar labels
        shell: pwsh
        run: ./scripts/patch-sidebar-labels.ps1

      - name: Replace root index with redirect
        shell: pwsh
        run: ./scripts/replace-root-index.ps1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
